<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ラッキーもくもくチャンス</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="tooltip" class="tooltip hidden"></div>
    <div id="loading">データを読み込み中...</div>
    <div id="legend"></div>

    <!-- スマホ用モーダル -->
    <div id="modal" class="modal hidden">
      <div id="modal-box">
        <button id="modal-close">✕</button>
        <p id="modal-ep"></p>
        <h2 id="modal-title"></h2>
        <a id="modal-link" href="#" target="_blank">Spotifyで聴く →</a>
        <p id="modal-summary"></p>
        <p id="modal-shownote"></p>
      </div>
    </div>

    <div id="controls">
      <div class="ctrl-row">
        <span class="ctrl-label">線の太さ</span>
        <input class="ctrl-slider" id="s-stroke"       type="range" min="0.2" max="4"   step="0.1"  value="1.2">
        <span class="ctrl-val"    id="v-stroke">1.20</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">線の引力</span>
        <input class="ctrl-slider" id="s-link"         type="range" min="30"  max="300" step="5"    value="55">
        <span class="ctrl-val"    id="v-link">55</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">中心引力</span>
        <input class="ctrl-slider" id="s-gravity"      type="range" min="0"   max="0.3"  step="0.01" value="0.04">
        <span class="ctrl-val"    id="v-gravity">0.04</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">デコ中心引力</span>
        <input class="ctrl-slider" id="s-deco-gravity" type="range" min="0"   max="1"    step="0.05" value="0">
        <span class="ctrl-val"    id="v-deco-gravity">0.00</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">デコ間隔のブレ</span>
        <input class="ctrl-slider" id="s-deco-spread"  type="range" min="0"   max="1"    step="0.05" value="0.3">
        <span class="ctrl-val"    id="v-deco-spread">0.30</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">円のサイズ</span>
        <input class="ctrl-slider" id="s-radius"       type="range" min="12"  max="56"  step="1"    value="21">
        <span class="ctrl-val"    id="v-radius">21</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">番号サイズ</span>
        <input class="ctrl-slider" id="s-ep-font"      type="range" min="6"   max="20"  step="1"    value="10">
        <span class="ctrl-val"    id="v-ep-font">10</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">タイトルサイズ</span>
        <input class="ctrl-slider" id="s-title-font"   type="range" min="6"   max="20"  step="1"    value="12">
        <span class="ctrl-val"    id="v-title-font">12</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">文字消える倍率</span>
        <input class="ctrl-slider" id="s-threshold"    type="range" min="0.1" max="1.5" step="0.05" value="1.2">
        <span class="ctrl-val"    id="v-threshold">1.20</span>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">回転速度</span>
        <input class="ctrl-slider" id="s-rotate"       type="range" min="0"   max="30"  step="0.5"  value="2">
        <span class="ctrl-val"    id="v-rotate">2.00</span>
      </div>
    </div>
  </div>

  <div id="version">v12</div>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
